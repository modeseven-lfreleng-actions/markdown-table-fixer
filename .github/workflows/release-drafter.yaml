# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: 'Release Drafter'

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update_release_draft:
    name: 'Update Release Draft'
    permissions:
      # write permission is required to create releases
      contents: write
    runs-on: 'ubuntu-latest'
    timeout-minutes: 3
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Show concurrency group'
        shell: bash
        run: |
          # Show concurrency group. This mirrors the workflow-level
          # concurrency definition (github.workflow + github.ref). Use
          # the built-in runner environment variables rather than
          # interpolating expression context into the run body.
          group="${GITHUB_WORKFLOW}-${GITHUB_REF}"
          {
            echo '## Release Drafter'
            echo "Concurrency group: $group"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Concurrency group: $group"

      - name: 'Update draft release'
        # yamllint disable-line rule:line-length
        uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
